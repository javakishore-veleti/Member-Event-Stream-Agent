apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mesa-api
  namespace: mesa
  labels:
    app.kubernetes.io/name: member-event-stream-agent
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mesa-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
