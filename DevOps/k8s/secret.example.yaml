# Secret Manager + workload identity, etc.) and apply it separately.
apiVersion: v1
kind: Secret
metadata:
  name: mesa-secrets
  namespace: mesa
type: Opaque
stringData:
  MCP_TOKEN: "replace-me-with-a-real-token"
  LLM_API_KEY: ""  # populate when LLM_PROVIDER=google_adk
